<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linger</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="dash">
      <header class="dash-header dash-header--toolbar">
        <div class="dash-header-main">
          <h1 class="dash-title">
            <img
              class="dash-logo-img"
              src="../icons/full-logo.svg"
              width="197"
              height="66"
              alt="linger"
            />
          </h1>
          <p class="dash-tagline">Your Pinterest taste profile.</p>
        </div>
        <a
          class="dash-settings-btn"
          href="settings.html"
          aria-label="Open settings"
          title="Settings"
        >
          <svg
            class="dash-settings-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
        </a>
      </header>

      <section class="dash-section" aria-labelledby="taste-heading">
        <h2 id="taste-heading" class="dash-section-title">Taste Profile</h2>
        <p id="dash-summary" class="dash-summary"></p>
        <div
          id="dash-taxonomy-loading"
          class="dash-taxonomy-loading hidden"
          aria-live="polite"
        >
          <div
            id="dash-taxonomy-lottie"
            class="dash-taxonomy-lottie"
            aria-hidden="true"
          ></div>
          <p class="dash-taxonomy-loading-text">Grouping labels…</p>
        </div>
        <p id="dash-taxonomy-status" class="dash-taxonomy-status" aria-live="polite"></p>
        <div class="dash-stat">
          <span class="dash-stat-label">Total saves logged</span>
          <span id="dash-total" class="dash-stat-value">0</span>
        </div>
        <div class="dash-charts-grid">
          <div class="dash-chart-col">
            <h3 class="dash-chart-title">Pieces you flag</h3>
            <div id="dash-regions-chart" class="dash-chart"></div>
          </div>
          <div class="dash-chart-col">
            <h3 class="dash-chart-title">Details you select</h3>
            <div id="dash-tags-chart" class="dash-chart"></div>
          </div>
        </div>
      </section>

      <section class="dash-section" aria-labelledby="recent-heading">
        <h2 id="recent-heading" class="dash-section-title">Recent logs</h2>
        <div id="dash-recent" class="dash-recent"></div>
        <p id="dash-recent-empty" class="dash-empty hidden">
          No entries yet. Save a pin on Pinterest and log what you love.
        </p>
      </section>

      <footer class="dash-footer">
        <button type="button" id="dash-clear" class="dash-clear">
          Clear all data
        </button>
        <div id="dash-clear-confirm" class="dash-clear-confirm hidden">
          <p>Delete every Linger log? This cannot be undone.</p>
          <div class="dash-clear-actions">
            <button type="button" id="dash-clear-cancel" class="dash-btn-secondary">
              Cancel
            </button>
            <button type="button" id="dash-clear-yes" class="dash-btn-danger">
              Delete all
            </button>
          </div>
        </div>
      </footer>
    </div>
    <script src="../libs/lottie.min.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
